name: ダッシュボード自動ビルド

on:
  push:
    paths:
      - 'data/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: monitoring_report.html を生成
        run: python3 build_html.py
      - name: HTMLをコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitoring_report.html
          git diff --cached --quiet || git commit -m "auto: rebuild dashboard $(date '+%Y-%m-%d %H:%M')"
          git push
